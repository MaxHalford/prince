name: Publishing

on:
  workflow_dispatch:
  push:
    tags:
      # Publish on any tag starting with a `v`, e.g., v0.1.0
      - v*

jobs:
  # Run the full CI suite (lint, typecheck, tests) and only publish if it passes.
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Install the project
        run: uv sync --locked
      - name: Build
        run: uv build
      - name: Publish
        run: uv publish
