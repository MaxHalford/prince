name: Code quality

on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: j178/prek-action@v2

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      # ty's rules are all configured as warnings (see [tool.ty.rules] in
      # pyproject.toml), so the job should only fail on error-level diagnostics.
      # Newer ty releases exit 1 on warnings by default; this flag keeps the
      # intended behaviour without pinning the tool version.
      - run: uvx ty check --exit-zero-on-warning
