files: .
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending

  # ruff is invoked via the project's own venv so the lint and format rules
  # always match what `uv run ruff …` does locally (single source of truth:
  # uv.lock). Bumping ruff is done by `uv lock --upgrade-package ruff`.
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run --frozen --extra dev ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff-format
        entry: uv run --frozen --extra dev ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
